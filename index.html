<body class="bg-[#F8F9FA] text-[#1A1A1A]">

<div class="max-w-6xl mx-auto min-h-screen flex flex-direction-column relative pb-24 lg:pl-64">

            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-4">

            { nl: "universiteit", tr: "üniversite" }, { nl: "wedstrijd", tr: "maç / yarışma" }, { nl: "voetbal", tr: "futbol" }, { nl: "pauze", tr: "ara" },
            { nl: "energie", tr: "enerji" }, { nl: "strafschop", tr: "penaltı" }, { nl: "ruzie", tr: "kavga" }, { nl: "vechten", tr: "dövüşmek" },
            { nl: "resultaat", tr: "sonuç" }, { nl: "kracht", tr: "güç" }, { nl: "vies", tr: "kirli" }, { nl: "tas", tr: "çanta" },
            { nl: "vloer", tr: "yer / zemin" }, { nl: "buitenland", tr: "yurt dışı" }, { nl: "reizen", tr: "seyahat etmek" }, { nl: "stad", tr: "şehir" },
            { nl: "probleem", tr: "problem" }, { nl: "files", tr: "trafik kuyruğu" }, { nl: "bus", tr: "otobüs" }, { nl: "halte", tr: "durak" },
            { nl: "wachten", tr: "beklemek" }, { nl: "goedkoper", tr: "daha ucuz" }, { nl: "den haag", tr: "lahey" }, { nl: "steden", tr: "şehirler" },
            { nl: "teveel", tr: "çok fazla" }, { nl: "vet", tr: "yağlı" }, { nl: "roken", tr: "sigara / duman" }, { nl: "weinig", tr: "az" },
            { nl: "voldoende", tr: "yeterli" }, { nl: "rust", tr: "dinlenme" }
        ]}
    ];

    const main = document.getElementById('mainContent');

    
    // 1. DERSLERİ GÖSTER
    function renderLessons() {
        const totalWords = masterData.reduce((sum, d) => sum + d.words.length, 0);
        const progressPercent = Math.round((totalWords / 320) * 100); // 300+ kelime üzerinden hesaplama
        
        // Progress bar'ı güncelle
        document.getElementById('progress-percent').textContent = progressPercent + '%';
        document.getElementById('progress-bar').style.width = progressPercent + '%';
        
        // Sidebar kategorilerini güncelle
        const sidebarCategories = document.getElementById('sidebar-categories');
        if (sidebarCategories) {
            sidebarCategories.innerHTML = masterData.map((d, index) => `
                <div class="flex items-center justify-between p-3 rounded-lg hover:bg-orange-50 transition-colors cursor-pointer" onclick="showLessonDetail(${index})">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-gradient-to-br from-orange-100 to-orange-50 rounded-full flex items-center justify-center text-orange-600">
                            <i class="fas fa-layer-group text-sm"></i>
                        </div>
                        <div class="ml-3">
                            <div class="font-semibold text-gray-800">${d.les}</div>
                            <div class="text-xs text-gray-500">${d.words.length} kelime</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        main.innerHTML = `
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">` + 
            masterData.map((d, index) => `
                <div onclick="showLessonDetail(${index})" class="les-card bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col items-center justify-center text-center hover:shadow-xl transition-all duration-300 hover:scale-105 cursor-pointer group">
                    <div class="w-14 h-14 bg-gradient-to-br from-orange-100 to-orange-50 rounded-full flex items-center justify-center mb-4 text-orange-600 group-hover:from-orange-500 group-hover:to-orange-400 group-hover:text-white transition-all duration-300">
                        <i class="fas fa-layer-group text-lg"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 text-sm">${d.les}</h3>
                    <p class="text-xs text-gray-500 mt-1">${d.words.length} Kelime</p>
                </div>
            `).join('') + `</div>`;
    }

    // 2. DERS DETAYI
    function showLessonDetail(index) {
        const data = masterData[index];
        main.innerHTML = `
            <button onclick="renderLessons()" class="mb-6 text-orange-600 font-bold text-sm hover:text-orange-700 transition-colors"><i class="fas fa-chevron-left mr-2"></i>Geri Dön</button>
            <h2 class="text-2xl font-bold mb-8 text-gray-800">${data.les} Kelime Listesi</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                ${data.words.map(w => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition-all duration-300 hover:border-orange-200">
                        <div class="flex justify-between items-start">
                            <div class="flex-grow">
                                <p class="font-bold text-lg text-gray-800 mb-1">${w.nl}</p>
                                <p class="text-sm text-gray-600">${w.tr}</p>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // 3. 15 GÜNLÜK YOL HARİTASI (Öğretmen Modu)
    function showRoadmap() {
        const schedule = [
            { d: "1-2", t: "Les 21-25: Temel Tanışma ve Sayılar" },
            { d: "3-4", t: "Les 26-30: Günlük Yaşam ve Ev" },
            { d: "5-6", t: "Les 31-40: Ulaşım ve Sağlık" },
            { d: "7-8", t: "Les 41-50: İş Hayatı ve Eğitim" },
            { d: "9-10", t: "Les 51-65: Toplum ve Kurallar" },
            { d: "11-13", t: "Genel Tekrar & Pratik Modu" },
            { d: "14-15", t: "Deneme Sınavları & Sesli Telaffuz" }
        ];
        main.innerHTML = `
            <h2 class="text-2xl font-bold mb-8 text-gray-800">15 Günlük Başarı Planı</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                ${schedule.map(s => `
                    <div class="flex gap-4 items-start bg-white p-6 rounded-2xl shadow-md border border-gray-100 hover:shadow-lg transition-all duration-300 hover:border-orange-200">
                        <div class="bg-gradient-to-r from-orange-500 to-orange-600 text-white font-bold px-4 py-2 rounded-lg text-sm flex-shrink-0 shadow-sm">GÜN ${s.d}</div>
                        <div class="flex-grow">
                            <p class="text-sm font-semibold text-gray-700 leading-relaxed">${s.t}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    
    function showSection(s) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-orange-600', 'text-gray-400'));
        event.currentTarget.classList.replace('text-gray-400', 'text-orange-600');
        if(s === 'roadmap') showRoadmap();
        if(s === 'dictionary') renderLessons();
    }

    // İlk açılış
    renderLessons();
</script>
</body>
</html>
