<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naar Nederland: Master Learner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .les-card { transition: all 0.2s ease; }
        .les-card:active { transform: scale(0.98); }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .word-card { perspective: 1000px; }
        .flipped { transform: rotateY(180deg); }
        .flip-content { transition: 0.6s; transform-style: preserve-3d; }
        .back { transform: rotateY(180deg); backface-visibility: hidden; }
        .front { backface-visibility: hidden; }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#1A1A1A]">

<div class="max-w-md mx-auto min-h-screen flex flex-direction-column relative pb-24">
    
    <!-- HEADER -->
    <header class="p-6 bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-orange-600">Naar Nederland</h1>
                <p class="text-xs text-gray-500 font-medium">15 GÜNLÜK TAM PROGRAM</p>
            </div>
            <div id="stats" class="text-right">
                <span class="block text-lg font-bold text-green-500" id="progress-percent">0%</span>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest">Öğrenildi</span>
            </div>
        </div>
    </header>

    <!-- SEARCH & FILTERS -->
    <div class="p-4 bg-white sticky top-[81px] z-40">
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="masterSearch" placeholder="Hollandaca veya Türkçe ara..." 
                   class="w-full pl-12 pr-4 py-3 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-400 transition-all">
        </div>
    </div>

    <!-- MAIN AREA -->
    <main id="mainContent" class="px-4 py-2 flex-grow">
        <!-- İçerik Dinamik Olarak Buraya Gelecek -->
    </main>

    <!-- NAVIGATION BAR -->
    <nav class="glass-nav fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t border-gray-100 p-4 flex justify-around items-center z-50">
        <button onclick="showSection('roadmap')" class="nav-item text-gray-400 hover:text-orange-500 flex flex-col items-center">
            <i class="fas fa-map-signs text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">15 GÜN</span>
        </button>
        <button onclick="showSection('dictionary')" class="nav-item text-orange-600 flex flex-col items-center">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">DERSLER</span>
        </button>
        <button onclick="startPractice()" class="nav-item text-gray-400 hover:text-orange-500 flex flex-col items-center">
            <i class="fas fa-bolt text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">PRATİK</span>
        </button>
    </nav>
</div>

<script>
    // TÜM VERİ SETİ (PDF'DEKİ TÜM KELİMELERİN SİSTEMATİK ÖZETİ)
    const masterData = [
        { les: "Les 21", words: [
            { nl: "wat", tr: "ne" }, { nl: "is", tr: "-dir" }, { nl: "uw", tr: "sizin" }, { nl: "naam (de)", tr: "ad/isim" },
            { nl: "dag", tr: "merhaba" }, { nl: "mevrouw (de)", tr: "bayan" }, { nl: "goedemiddag", tr: "iyi günler" },
            { nl: "kan (kunnen)", tr: "olabilir" }, { nl: "ik", tr: "ben" }, { nl: "u", tr: "size/siz" }, { nl: "helpen", tr: "yardım etmek" },
            { nl: "wil (willen)", tr: "istiyorum" }, { nl: "mij", tr: "kendimi" }, { nl: "graag", tr: "isteyerek" }, { nl: "goed", tr: "iyi" }
        ]},
        { les: "Les 22", words: [
            { nl: "vragen (de)", tr: "sorular" }, { nl: "kennen", tr: "tanımak" }, { nl: "wij", tr: "biz" }, { nl: "elkaar", tr: "birbirimizi" },
            { nl: "geloof (geloven)", tr: "inanç" }, { nl: "niet", tr: "değil" }, { nl: "jij", tr: "sen" }, { nl: "straat (de)", tr: "sokak" }
        ]},
        { les: "Les 23-24", words: [
            { nl: "ons", tr: "bizim" }, { nl: "huis (het)", tr: "ev" }, { nl: "zien", tr: "görmek" }, { nl: "deur", tr: "kapı" },
            { nl: "seizoenen", tr: "mevsimler" }, { nl: "januari", tr: "Ocak" }, { nl: "winter", tr: "kış" }, { nl: "koud", tr: "soğuk" }
        ]},
        { les: "Les 25-27", words: [
            { nl: "werk (het)", tr: "iş" }, { nl: "school", tr: "okul" }, { nl: "laat", tr: "geç" }, { nl: "tijd", tr: "zaman" },
            { nl: "eten", tr: "yemek" }, { nl: "drinken", tr: "içmek" }, { nl: "vroeg", tr: "erken" }, { nl: "bed", tr: "yatak" }
        ]},
        { les: "Les 28-35", words: [
            { nl: "nieuwe", tr: "yeni" }, { nl: "familie", tr: "aile" }, { nl: "beter", tr: "iyi" }, { nl: "ziek", tr: "hasta" },
            { nl: "fiets", tr: "bisiklet" }, { nl: "auto", tr: "otomobil" }, { nl: "waarom", tr: "neden" }, { nl: "omdat", tr: "çünkü" }
        ]},
        { les: "Les 36-45", words: [
            { nl: "kind", tr: "çocuk" }, { nl: "trouwen", tr: "evlenmek" }, { nl: "leren", tr: "öğrenmek" }, { nl: "taal", tr: "dil" },
            { nl: "vallen", tr: "düşmek" }, { nl: "ruim", tr: "fazla" }, { nl: "bellen", tr: "telefon etmek" }, { nl: "leraar", tr: "öğretmen" }
        ]},
        { les: "Les 46-65", words: [
            { nl: "ervaring", tr: "tecrübe" }, { nl: "bouw", tr: "inşaat" }, { nl: "trein", tr: "tren" }, { nl: "pinnen", tr: "kartla ödeme" },
            { nl: "vrije tijd", tr: "boş zaman" }, { nl: "geluk", tr: "mutluluk" }, { nl: "regels", tr: "kurallar" }, { nl: "zover", tr: "yaklaşmakta" }
        ]}
    ];

    const main = document.getElementById('mainContent');
    const searchInput = document.getElementById('masterSearch');

    // Sesli Okuma Fonksiyonu
    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'nl-NL'; // Hollandaca
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    // 1. DERSLERİ GÖSTER
    function renderLessons() {
        main.innerHTML = `<div class="grid grid-cols-2 gap-4">` + 
            masterData.map((d, index) => `
                <div onclick="showLessonDetail(${index})" class="les-card bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center mb-3 text-orange-600">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">${d.les}</h3>
                    <p class="text-[10px] text-gray-400 mt-1">${d.words.length} Kelime</p>
                </div>
            `).join('') + `</div>`;
    }

    // 2. DERS DETAYI
    function showLessonDetail(index) {
        const data = masterData[index];
        main.innerHTML = `
            <button onclick="renderLessons()" class="mb-4 text-orange-600 font-bold text-sm"><i class="fas fa-chevron-left mr-2"></i>Geri Dön</button>
            <h2 class="text-xl font-bold mb-6">${data.les} Kelime Listesi</h2>
            <div class="space-y-3">
                ${data.words.map(w => `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50">
                        <div>
                            <p class="font-bold text-lg text-gray-800">${w.nl}</p>
                            <p class="text-sm text-gray-500">${w.tr}</p>
                        </div>
                        <button onclick="speak('${w.nl}')" class="w-10 h-10 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center hover:bg-orange-100 hover:text-orange-600">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // 3. 15 GÜNLÜK YOL HARİTASI (Öğretmen Modu)
    function showRoadmap() {
        const schedule = [
            { d: "1-2", t: "Les 21-25: Temel Tanışma ve Sayılar" },
            { d: "3-4", t: "Les 26-30: Günlük Yaşam ve Ev" },
            { d: "5-6", t: "Les 31-40: Ulaşım ve Sağlık" },
            { d: "7-8", t: "Les 41-50: İş Hayatı ve Eğitim" },
            { d: "9-10", t: "Les 51-65: Toplum ve Kurallar" },
            { d: "11-13", t: "Genel Tekrar & Pratik Modu" },
            { d: "14-15", t: "Deneme Sınavları & Sesli Telaffuz" }
        ];
        main.innerHTML = `
            <h2 class="text-xl font-bold mb-6">15 Günlük Başarı Planı</h2>
            <div class="space-y-4">
                ${schedule.map(s => `
                    <div class="flex gap-4 items-start">
                        <div class="bg-orange-500 text-white font-bold px-3 py-1 rounded-lg text-sm">GÜN ${s.d}</div>
                        <div class="flex-grow pb-4 border-b border-gray-100">
                            <p class="text-sm font-semibold">${s.t}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // 4. AKILLI ARAMA
    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        if(!val) { renderLessons(); return; }
        
        let results = [];
        masterData.forEach(d => {
            d.words.forEach(w => {
                if(w.nl.toLowerCase().includes(val) || w.tr.toLowerCase().includes(val)) {
                    results.push({...w, les: d.les});
                }
            });
        });

        main.innerHTML = `<div class="space-y-3">` + 
            results.map(r => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-orange-100">
                    <div>
                        <p class="font-bold text-gray-800">${r.nl}</p>
                        <p class="text-sm text-gray-500">${r.tr}</p>
                        <span class="text-[9px] uppercase font-bold text-orange-400">${r.les}</span>
                    </div>
                    <button onclick="speak('${r.nl}')" class="text-orange-400 p-2"><i class="fas fa-volume-up"></i></button>
                </div>
            `).join('') + `</div>`;
    });

    // 5. PRATİK MODU (Flaş Kartlar)
    function startPractice() {
        const allWords = masterData.flatMap(d => d.words);
        const randomWord = allWords[Math.floor(Math.random() * allWords.length)];
        
        main.innerHTML = `
            <div class="flex flex-col items-center justify-center pt-10">
                <div class="word-card w-full h-64 cursor-pointer" onclick="this.querySelector('.flip-content').classList.toggle('flipped')">
                    <div class="flip-content relative w-full h-full shadow-lg rounded-3xl">
                        <!-- ÖN YÜZ -->
                        <div class="front absolute inset-0 bg-orange-600 text-white rounded-3xl flex flex-col items-center justify-center p-6 text-center">
                            <span class="text-xs opacity-70 mb-2 uppercase tracking-widest">Hollandaca</span>
                            <h2 class="text-4xl font-bold">${randomWord.nl}</h2>
                            <p class="mt-4 text-xs italic">Anlamı görmek için tıkla</p>
                        </div>
                        <!-- ARKA YÜZ -->
                        <div class="back absolute inset-0 bg-white text-gray-800 rounded-3xl border-4 border-orange-600 flex flex-col items-center justify-center p-6 text-center">
                            <span class="text-xs text-gray-400 mb-2 uppercase tracking-widest">Türkçe Anlamı</span>
                            <h2 class="text-4xl font-bold text-orange-600">${randomWord.tr}</h2>
                            <button onclick="speak('${randomWord.nl}')" class="mt-4 text-orange-500"><i class="fas fa-volume-up mr-2"></i>Dinle</button>
                        </div>
                    </div>
                </div>
                <button onclick="startPractice()" class="mt-10 bg-gray-800 text-white px-8 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                    SIRADAKİ KELİME <i class="fas fa-arrow-right ml-2 text-orange-400"></i>
                </button>
            </div>
        `;
    }

    function showSection(s) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-orange-600', 'text-gray-400'));
        event.currentTarget.classList.replace('text-gray-400', 'text-orange-600');
        if(s === 'roadmap') showRoadmap();
        if(s === 'dictionary') renderLessons();
    }

    // İlk açılış
    renderLessons();
</script>
</body>
</html>
